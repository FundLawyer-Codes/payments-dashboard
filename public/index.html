<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payments Intelligence · Morning Brief</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EF;
    --border: #E2DDD5;
    --ink: #1A1714;
    --muted: #8A847C;
    --china:       #B5541A;
    --chinareports:#1A6B6B;
    --us:          #1A4B8A;
    --global:      #1A7A4B;
    --industry:    #7A5C1A;
    --enforce:     #8A1A1A;
    --reg:         #6B1A8A;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--ink); font-family:'Outfit',sans-serif; font-weight:300; min-height:100vh; }

  /* MASTHEAD */
  .masthead { border-bottom:3px double var(--ink); padding:24px 40px 20px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:20px; }
  .masthead-left { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); }
  .masthead-left span { display:block; }
  .masthead-center { text-align:center; }
  .masthead-title { font-family:'Libre Baskerville',serif; font-size:clamp(22px,4vw,36px); font-weight:700; line-height:1; }
  .masthead-sub { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-top:6px; }
  .masthead-right { text-align:right; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); }
  .live-dot { display:inline-block; width:7px; height:7px; background:var(--china); border-radius:50%; margin-right:5px; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* PAGE TABS — China / Global */
  .page-tabs { display:flex; border-bottom:2px solid var(--ink); }
  .page-tab { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; padding:12px 32px; cursor:pointer; background:none; border:none; color:var(--muted); border-bottom:3px solid transparent; margin-bottom:-2px; transition:all 0.15s; }
  .page-tab:hover { color:var(--ink); }
  .page-tab.active { color:var(--ink); font-weight:600; border-bottom-color:var(--ink); }

  /* SECTION FILTER TABS */
  .filter-bar { border-bottom:1px solid var(--border); padding:6px 40px; display:flex; overflow-x:auto; gap:0; }
  .ftab { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; padding:3px 14px; border-right:1px solid var(--border); color:var(--muted); cursor:pointer; white-space:nowrap; background:none; border-top:none; border-bottom:none; border-left:none; transition:color 0.15s; }
  .ftab:first-child { padding-left:0; }
  .ftab:hover, .ftab.active { color:var(--ink); font-weight:500; }

  /* GRID */
  .container { max-width:1200px; margin:0 auto; padding:32px 40px 60px; }
  .page { display:none; }
  .page.active { display:block; }
  .grid { display:grid; grid-template-columns:repeat(2,1fr); border:1px solid var(--ink); }

  .section { border-right:1px solid var(--ink); border-bottom:1px solid var(--ink); display:none; }
  .section.visible { display:block; }
  .section:nth-child(even) { border-right:none; }

  .section-head { border-bottom:2px solid var(--ink); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; }
  .section-label { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; font-weight:500; }
  .section-desc { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted); margin-top:2px; }

  .label-china        { color:var(--china); }
  .label-chinareports { color:var(--chinareports); }
  .label-us           { color:var(--us); }
  .label-global       { color:var(--global); }
  .label-industry     { color:var(--industry); }
  .label-enforce      { color:var(--enforce); }
  .label-reg          { color:var(--reg); }

  .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .dot-china        { background:var(--china); }
  .dot-chinareports { background:var(--chinareports); }
  .dot-us           { background:var(--us); }
  .dot-global       { background:var(--global); }
  .dot-industry     { background:var(--industry); }
  .dot-enforce      { background:var(--enforce); }
  .dot-reg          { background:var(--reg); }

  /* ARTICLES */
  .article { padding:14px 20px; border-bottom:1px solid var(--border); display:grid; grid-template-columns:1fr auto; gap:12px; align-items:start; text-decoration:none; color:inherit; transition:background 0.12s; }
  .article:last-child { border-bottom:none; }
  .article:hover { background:rgba(0,0,0,0.025); }
  .article-title { font-family:'Libre Baskerville',serif; font-size:13.5px; line-height:1.45; }
  .article-meta { text-align:right; flex-shrink:0; }
  .article-source { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); display:block; }
  .article-time { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--border); display:block; margin-top:2px; }

  .loading { padding:32px 20px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); }
  .spinner { display:inline-block; width:12px; height:12px; border:2px solid var(--border); border-top-color:var(--muted); border-radius:50%; margin-left:8px; vertical-align:middle; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .empty { padding:24px 20px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); }

  /* FOOTER */
  .footer { margin-top:32px; border-top:1px solid var(--border); padding-top:20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
  .footer-note { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); }
  .refresh-btn { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; padding:6px 16px; background:var(--ink); color:var(--bg); border:none; border-radius:3px; cursor:pointer; }
  .refresh-btn:hover { opacity:0.75; }

  @media(max-width:700px) {
    .grid { grid-template-columns:1fr; }
    .masthead { grid-template-columns:1fr; text-align:center; }
    .masthead-right { text-align:center; }
    .container { padding:20px 16px 40px; }
    .filter-bar { padding:6px 16px; }
    .page-tab { padding:10px 20px; }
  }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-left">
    <span id="today-date"></span>
    <span id="today-day"></span>
  </div>
  <div class="masthead-center">
    <div class="masthead-title">Payments Intelligence</div>
    <div class="masthead-sub">Morning Brief · Cross-Border Legal Edition</div>
  </div>
  <div class="masthead-right">
    <span class="live-dot"></span><span id="last-updated">Loading...</span>
  </div>
</div>

<!-- PAGE TABS -->
<div class="page-tabs" style="padding: 0 40px;">
  <button class="page-tab active" data-page="china-page">🇨🇳 China</button>
  <button class="page-tab" data-page="global-page">🌐 Global & Others</button>
</div>

<!-- CHINA PAGE -->
<div id="china-page" class="page active">
  <div class="filter-bar">
    <button class="ftab active" data-filter="all">All</button>
    <button class="ftab" data-filter="china">China Regulatory</button>
    <button class="ftab" data-filter="chinareports">Legal Reports</button>
  </div>
  <div class="container">
    <div class="grid" id="china-grid"></div>
    <div class="footer">
      <div class="footer-note">Google News · <span id="china-count">—</span> headlines</div>
      <button class="refresh-btn" onclick="location.reload()">↻ Refresh</button>
    </div>
  </div>
</div>

<!-- GLOBAL PAGE -->
<div id="global-page" class="page">
  <div class="filter-bar">
    <button class="ftab active" data-filter="all">All</button>
    <button class="ftab" data-filter="us">US</button>
    <button class="ftab" data-filter="global">Global</button>
    <button class="ftab" data-filter="industry">Industry</button>
    <button class="ftab" data-filter="enforce">Enforcement</button>
    <button class="ftab" data-filter="reg">Regulators</button>
  </div>
  <div class="container">
    <div class="grid" id="global-grid"></div>
    <div class="footer">
      <div class="footer-note">Google News · <span id="global-count">—</span> headlines</div>
      <button class="refresh-btn" onclick="location.reload()">↻ Refresh</button>
    </div>
  </div>
</div>

<script>
const CHINA_SECTIONS = [
  { id:'china',        category:'china',        label:'China Cross-Border',         desc:'人民银行 · SAFE · CIPS · RMB · 支付机构' },
  { id:'chinareports', category:'chinareports', label:'China Fintech — Legal Reports', desc:'IFLR · Law Firm Alerts · Fangda · Han Kun · KWM' },
];

const GLOBAL_SECTIONS = [
  { id:'us',          category:'us',      label:'US Cross-Border',       desc:'OFAC · FinCEN · CFPB · MSB Licensing' },
  { id:'global',      category:'global',  label:'Global Infrastructure', desc:'G20 · SWIFT · ISO 20022 · CBDC · mBridge' },
  { id:'industry',    category:'industry',label:'Industry & Market',     desc:'Bloomberg · Reuters · Payments Dive' },
  { id:'enforcement', category:'enforce', label:'Enforcement & Legal',   desc:'Penalties · Lawsuits · Compliance Failures' },
  { id:'regulators',  category:'reg',     label:'Regulatory Agencies',   desc:'Fed · CFPB · FinCEN · OCC · HKMA · MAS' },
];

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return '';
  const diff = Math.floor((Date.now() - d) / 60000);
  if (diff < 60) return `${diff}m ago`;
  if (diff < 1440) return `${Math.floor(diff/60)}h ago`;
  return `${Math.floor(diff/1440)}d ago`;
}

function buildSection(s) {
  const el = document.createElement('div');
  el.className = 'section visible';
  el.dataset.category = s.category;
  el.innerHTML = `
    <div class="section-head">
      <div>
        <div class="section-label label-${s.category}">${s.label}</div>
        <div class="section-desc">${s.desc}</div>
      </div>
      <span class="dot dot-${s.category}"></span>
    </div>
    <div id="articles-${s.id}">
      <div class="loading">Loading<span class="spinner"></span></div>
    </div>`;
  return el;
}

function renderArticles(id, items) {
  const el = document.getElementById(`articles-${id}`);
  if (!items || !items.length) { el.innerHTML = '<div class="empty">No recent articles found</div>'; return 0; }
  el.innerHTML = items.map(item => `
    <a class="article" href="${item.url}" target="_blank" rel="noopener">
      <div class="article-title">${item.title}</div>
      <div class="article-meta">
        <span class="article-source">${item.source}</span>
        <span class="article-time">${timeAgo(item.date)}</span>
      </div>
    </a>`).join('');
  return items.length;
}

async function fetchSection(s) {
  try {
    const res = await fetch(`/api/news?feed=${s.id}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const items = await res.json();
    return renderArticles(s.id, items);
  } catch(e) {
    const el = document.getElementById(`articles-${s.id}`);
    if (el) el.innerHTML = '<div class="empty">Could not load</div>';
    return 0;
  }
}

// Page tab switching
document.querySelectorAll('.page-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(tab.dataset.page).classList.add('active');
  });
});

// Filter tab switching — scoped to parent page
document.querySelectorAll('.filter-bar').forEach(bar => {
  bar.querySelectorAll('.ftab').forEach(tab => {
    tab.addEventListener('click', () => {
      bar.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const f = tab.dataset.filter;
      // Find the grid in the same page
      const page = bar.closest('.page');
      page.querySelectorAll('.section').forEach(s => {
        s.classList.toggle('visible', f === 'all' || s.dataset.category === f);
      });
    });
  });
});

async function init() {
  const now = new Date();
  document.getElementById('today-date').textContent = now.toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});
  document.getElementById('today-day').textContent = now.toLocaleDateString('en-US', {weekday:'long'});

  // Build grids
  const chinaGrid = document.getElementById('china-grid');
  CHINA_SECTIONS.forEach(s => chinaGrid.appendChild(buildSection(s)));

  const globalGrid = document.getElementById('global-grid');
  GLOBAL_SECTIONS.forEach(s => globalGrid.appendChild(buildSection(s)));

  // Fetch all in parallel
  const [chinaCounts, globalCounts] = await Promise.all([
    Promise.all(CHINA_SECTIONS.map(fetchSection)),
    Promise.all(GLOBAL_SECTIONS.map(fetchSection)),
  ]);

  document.getElementById('china-count').textContent = `${chinaCounts.reduce((a,b)=>a+b,0)} headlines`;
  document.getElementById('global-count').textContent = `${globalCounts.reduce((a,b)=>a+b,0)} headlines`;
  document.getElementById('last-updated').textContent = `Updated ${now.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'})}`;
}

init();
</script>
</body>
</html>
