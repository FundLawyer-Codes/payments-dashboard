<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payments Intelligence · Morning Brief</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --border: #E2DDD5;
    --ink: #1A1714;
    --muted: #8A847C;
    --accent: #B5541A;
    --accent2: #1A4B8A;
    --accent3: #1A7A4B;
    --accent4: #6B1A8A;
    --pub: #7A5C1A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  .masthead {
    border-bottom: 3px double var(--ink);
    padding: 24px 40px 20px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 20px;
  }
  .masthead-left {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .masthead-left span { display: block; }
  .masthead-center { text-align: center; }
  .masthead-title {
    font-family: 'Libre Baskerville', serif;
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .masthead-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
  }
  .masthead-right {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--accent3);
    border-radius: 50%;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .edition-bar {
    border-bottom: 1px solid var(--ink);
    padding: 8px 40px;
    display: flex;
    overflow-x: auto;
  }
  .edition-tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 16px;
    border-right: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s;
    background: none;
    border-top: none; border-bottom: none; border-left: none;
  }
  .edition-tab:first-child { padding-left: 0; }
  .edition-tab:hover { color: var(--ink); }
  .edition-tab.active { color: var(--ink); font-weight: 500; }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 40px 60px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    border: 1px solid var(--ink);
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
    .masthead { grid-template-columns: 1fr; text-align: center; }
    .masthead-right { text-align: center; }
    .container { padding: 20px 16px 40px; }
    .edition-bar { padding: 8px 16px; }
  }

  .section {
    border-right: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    display: none;
  }
  .section.visible { display: block; }
  .section:nth-child(even) { border-right: none; }

  .section-head {
    border-bottom: 2px solid var(--ink);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .section-label.china { color: var(--accent); }
  .section-label.us    { color: var(--accent2); }
  .section-label.global{ color: var(--accent3); }
  .section-label.legal { color: var(--accent4); }
  .section-label.pub   { color: var(--pub); }

  .section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .section-dot.china  { background: var(--accent); }
  .section-dot.us     { background: var(--accent2); }
  .section-dot.global { background: var(--accent3); }
  .section-dot.legal  { background: var(--accent4); }
  .section-dot.pub    { background: var(--pub); }

  .article {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: start;
    text-decoration: none;
    color: inherit;
    transition: background 0.12s;
  }
  .article:last-child { border-bottom: none; }
  .article:hover { background: rgba(0,0,0,0.025); }

  .article-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 13.5px;
    line-height: 1.45;
    color: var(--ink);
  }
  .article-meta { text-align: right; flex-shrink: 0; }
  .article-source {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
  }
  .article-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--border);
    display: block;
    margin-top: 2px;
  }

  .loading {
    padding: 32px 20px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--muted);
    border-radius: 50%;
    margin-left: 8px;
    vertical-align: middle;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    padding: 24px 20px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .footer {
    margin-top: 32px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .footer-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }
  .refresh-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 16px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .refresh-btn:hover { opacity: 0.75; }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-left">
    <span id="today-date"></span>
    <span id="today-day"></span>
  </div>
  <div class="masthead-center">
    <div class="masthead-title">Payments Intelligence</div>
    <div class="masthead-sub">Morning Brief · Cross-Border Edition</div>
  </div>
  <div class="masthead-right">
    <span class="live-dot"></span><span id="last-updated">Loading...</span>
  </div>
</div>

<div class="edition-bar">
  <button class="edition-tab active" data-filter="all">All Topics</button>
  <button class="edition-tab" data-filter="pub">Publications</button>
  <button class="edition-tab" data-filter="china">China</button>
  <button class="edition-tab" data-filter="us">US Regulatory</button>
  <button class="edition-tab" data-filter="global">Global</button>
  <button class="edition-tab" data-filter="legal">Legal</button>
</div>

<div class="container">
  <div class="grid" id="grid"></div>
  <div class="footer">
    <div class="footer-note">Powered by Claude AI · Refreshes on load · <span id="article-count">—</span> headlines</div>
    <button class="refresh-btn" onclick="location.reload()">↻ Refresh</button>
  </div>
</div>

<script>
const TOPICS = [
  { id:'pub1',    category:'pub',    label:'Payments Dive',      query:'payments industry news February 2026' },
  { id:'pub2',    category:'pub',    label:'American Banker',    query:'banking payments regulation news February 2026' },
  { id:'pub3',    category:'pub',    label:'The Paypers',        query:'fintech cross-border payments news February 2026' },
  { id:'pub4',    category:'pub',    label:'a16z Fintech',       query:'fintech venture capital trends February 2026' },
  { id:'pub5',    category:'pub',    label:'Federal Reserve',    query:'Federal Reserve payments policy February 2026' },
  { id:'pub6',    category:'pub',    label:'CFPB',               query:'CFPB consumer finance enforcement February 2026' },
  { id:'pub7',    category:'pub',    label:'FinCEN',             query:'FinCEN anti-money laundering enforcement February 2026' },
  { id:'pub8',    category:'pub',    label:'OCC',                query:'OCC bank regulation enforcement February 2026' },
  { id:'china1',  category:'china',  label:'SAFE & PBoC',        query:'China SAFE PBoC cross-border payment regulation 2026' },
  { id:'china2',  category:'china',  label:'CIPS & RMB',         query:'CIPS RMB cross-border payment settlement 2026' },
  { id:'china3',  category:'china',  label:'China Fintech',      query:'China fintech payment policy regulation 2026' },
  { id:'us1',     category:'us',     label:'OFAC & Sanctions',   query:'OFAC sanctions payment enforcement action 2026' },
  { id:'us2',     category:'us',     label:'FinCEN & AML',       query:'FinCEN AML money laundering payment enforcement 2026' },
  { id:'us3',     category:'us',     label:'CFPB & Remittance',  query:'CFPB remittance cross-border transfer regulation 2026' },
  { id:'global1', category:'global', label:'G20 & BIS',          query:'G20 BIS cross-border payments reform 2026' },
  { id:'global2', category:'global', label:'SWIFT & ISO 20022',  query:'SWIFT ISO 20022 payment standard migration 2026' },
  { id:'global3', category:'global', label:'CBDC & mBridge',     query:'CBDC mBridge digital currency cross-border 2026' },
  { id:'legal1',  category:'legal',  label:'Legal & Compliance', query:'payments fintech compliance legal enforcement 2026' },
];

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return '';
  const diff = Math.floor((Date.now() - d) / 60000);
  if (diff < 60) return `${diff}m ago`;
  if (diff < 1440) return `${Math.floor(diff/60)}h ago`;
  return `${Math.floor(diff/1440)}d ago`;
}

function buildSection(topic) {
  const el = document.createElement('div');
  el.className = 'section visible';
  el.dataset.category = topic.category;
  el.innerHTML = `
    <div class="section-head">
      <span class="section-label ${topic.category}">${topic.label}</span>
      <span class="section-dot ${topic.category}"></span>
    </div>
    <div id="articles-${topic.id}">
      <div class="loading">Fetching<span class="spinner"></span></div>
    </div>`;
  return el;
}

function renderArticles(id, items) {
  const el = document.getElementById(`articles-${id}`);
  if (!items || !items.length) {
    el.innerHTML = '<div class="empty">No recent articles found</div>';
    return;
  }
  el.innerHTML = items.slice(0, 4).map(item => `
    <a class="article" href="${item.url || '#'}" target="_blank" rel="noopener">
      <div class="article-title">${item.title || 'Untitled'}</div>
      <div class="article-meta">
        <span class="article-source">${item.source || ''}</span>
        <span class="article-time">${timeAgo(item.date)}</span>
      </div>
    </a>`).join('');
}

async function fetchTopic(topic, retries = 2) {
  for (let attempt = 0; attempt <= retries; attempt++) {
    try {
      const res = await fetch('/api/news', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: topic.query })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const items = await res.json();
      if (items && items.length > 0) {
        renderArticles(topic.id, items);
        return items.length;
      }
      // Got empty array — retry
      if (attempt < retries) await sleep(1000);
    } catch(e) {
      if (attempt < retries) await sleep(1500);
    }
  }
  const el = document.getElementById(`articles-${topic.id}`);
  if (el) el.innerHTML = '<div class="empty">No recent articles found</div>';
  return 0;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

document.querySelectorAll('.edition-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.edition-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const f = tab.dataset.filter;
    document.querySelectorAll('.section').forEach(s => {
      s.classList.toggle('visible', f === 'all' || s.dataset.category === f);
    });
  });
});

async function init() {
  const now = new Date();
  document.getElementById('today-date').textContent = now.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  document.getElementById('today-day').textContent = now.toLocaleDateString('en-US', { weekday:'long' });

  const grid = document.getElementById('grid');
  TOPICS.forEach(t => grid.appendChild(buildSection(t)));

  // Fetch one at a time with a small delay between each to avoid overwhelming the API
  let total = 0;
  for (const topic of TOPICS) {
    const count = await fetchTopic(topic);
    total += count;
    document.getElementById('article-count').textContent = `${total} headlines`;
    await sleep(500);
  }

  document.getElementById('last-updated').textContent = `Updated ${now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' })}`;
}

init();
</script>
</body>
</html>
