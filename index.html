<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payments Intelligence · Morning Brief</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --border: #E2DDD5;
    --ink: #1A1714;
    --muted: #8A847C;
    --accent: #B5541A;
    --accent2: #1A4B8A;
    --accent3: #1A7A4B;
    --accent4: #6B1A8A;
    --tag-h: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* MASTHEAD */
  .masthead {
    border-bottom: 3px double var(--ink);
    padding: 24px 40px 20px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 20px;
  }

  .masthead-left {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .masthead-left span { display: block; }

  .masthead-center {
    text-align: center;
  }

  .masthead-title {
    font-family: 'Libre Baskerville', serif;
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .masthead-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
  }

  .masthead-right {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--accent3);
    border-radius: 50%;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* EDITION BAR */
  .edition-bar {
    border-bottom: 1px solid var(--ink);
    padding: 8px 40px;
    display: flex;
    gap: 0;
    overflow-x: auto;
  }

  .edition-tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 16px;
    border-right: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s;
    background: none;
    border-top: none;
    border-bottom: none;
    border-left: none;
  }

  .edition-tab:first-child { padding-left: 0; }
  .edition-tab:hover { color: var(--ink); }
  .edition-tab.active { color: var(--ink); font-weight: 500; }

  /* MAIN GRID */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 40px 60px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0;
    border: 1px solid var(--ink);
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
    .masthead { grid-template-columns: 1fr; text-align: center; }
    .masthead-right { text-align: center; }
    .container { padding: 20px 16px 40px; }
    .edition-bar { padding: 8px 16px; }
  }

  /* SECTION */
  .section {
    border-right: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    padding: 0;
    display: none;
  }

  .section.visible { display: block; }
  .section:nth-child(even) { border-right: none; }

  .section-head {
    border-bottom: 2px solid var(--ink);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .section-label.china { color: var(--accent); }
  .section-label.us { color: var(--accent2); }
  .section-label.global { color: var(--accent3); }
  .section-label.legal { color: var(--accent4); }
  .section-label.pub { color: #7A5C1A; }

  .section-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .section-dot.china { background: var(--accent); }
  .section-dot.us { background: var(--accent2); }
  .section-dot.global { background: var(--accent3); }
  .section-dot.legal { background: var(--accent4); }
  .section-dot.pub { background: #7A5C1A; }

  /* ARTICLES */
  .articles { padding: 0; }

  .article {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: start;
    text-decoration: none;
    color: inherit;
    transition: background 0.12s;
  }

  .article:last-child { border-bottom: none; }
  .article:hover { background: rgba(0,0,0,0.025); }

  .article-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 13.5px;
    line-height: 1.45;
    color: var(--ink);
    font-weight: 400;
  }

  .article-meta {
    text-align: right;
    flex-shrink: 0;
  }

  .article-source {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
  }

  .article-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--border);
    display: block;
    margin-top: 2px;
  }

  /* LOADING / EMPTY */
  .loading {
    padding: 32px 20px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .loading::after {
    content: '';
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--muted);
    border-radius: 50%;
    margin-left: 8px;
    vertical-align: middle;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    padding: 32px 20px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* FOOTER */
  .footer {
    margin-top: 32px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .footer-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .refresh-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 16px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .refresh-btn:hover { opacity: 0.75; }

  /* HOSTING NOTE */
  .hosting-note {
    background: #EEF4FF;
    border: 1px solid #C7D9F8;
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 28px;
    font-size: 13px;
    line-height: 1.6;
  }
  .hosting-note strong { font-weight: 600; display: block; margin-bottom: 4px; }
  .hosting-note code {
    background: #dce8fc;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--ink);
    margin: 28px 0;
  }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-left">
    <span id="today-date"></span>
    <span id="today-day"></span>
  </div>
  <div class="masthead-center">
    <div class="masthead-title">Payments Intelligence</div>
    <div class="masthead-sub">Morning Brief · Cross-Border Edition</div>
  </div>
  <div class="masthead-right">
    <span class="live-dot"></span><span id="last-updated">Loading...</span>
  </div>
</div>

<div class="edition-bar">
  <button class="edition-tab active" data-filter="all">All Topics</button>
  <button class="edition-tab" data-filter="pub">Publications</button>
  <button class="edition-tab" data-filter="china">China</button>
  <button class="edition-tab" data-filter="us">US Regulatory</button>
  <button class="edition-tab" data-filter="global">Global</button>
  <button class="edition-tab" data-filter="legal">Legal</button>
</div>

<div class="container">



  <div class="grid" id="grid"></div>

  <div class="footer">
    <div class="footer-note">Publications + Google News · Refreshes on page load · <span id="article-count">—</span> articles</div>
    <button class="refresh-btn" onclick="location.reload()">↻ Refresh</button>
  </div>
</div>

<script>
// ─── CONFIG: topics with Google News RSS search queries ───────────────────────
const TOPICS = [
  // PUBLICATIONS — direct RSS feeds
  {
    id: 'pub1',
    category: 'pub',
    label: 'Payments Dive',
    rss: 'https://www.paymentsdive.com/feeds/news/',
  },
  {
    id: 'pub2',
    category: 'pub',
    label: 'American Banker',
    rss: 'https://www.americanbanker.com/feed',
  },
  {
    id: 'pub3',
    category: 'pub',
    label: 'The Paypers',
    rss: 'https://thepaypers.com/rss/all',
  },
  {
    id: 'pub4',
    category: 'pub',
    label: 'a16z Fintech',
    rss: 'https://a16z.com/tag/fintech/feed/',
  },
  {
    id: 'pub5',
    category: 'pub',
    label: 'Federal Reserve',
    rss: 'https://www.federalreserve.gov/feeds/press_all.xml',
  },
  {
    id: 'pub6',
    category: 'pub',
    label: 'CFPB Newsroom',
    rss: 'https://www.consumerfinance.gov/about-us/newsroom/feed/',
  },
  {
    id: 'pub7',
    category: 'pub',
    label: 'FinCEN',
    rss: 'https://www.fincen.gov/news-room/rss.xml',
    fallbackQuery: 'FinCEN enforcement AML payment 2025 2026',
  },
  {
    id: 'pub8',
    category: 'pub',
    label: 'OCC',
    rss: 'https://www.occ.gov/tools/rss-feeds/occ-news.xml',
    fallbackQuery: 'OCC enforcement bank payment 2025 2026',
  },
  // GOOGLE NEWS TOPICS
  {
    id: 'china1',
    category: 'china',
    label: 'SAFE & PBoC',
    query: 'SAFE PBoC cross-border payment China regulation',
  },
  {
    id: 'china2',
    category: 'china',
    label: 'CIPS & RMB',
    query: 'CIPS RMB cross-border payment settlement China',
  },
  {
    id: 'china3',
    category: 'china',
    label: 'China Fintech Policy',
    query: 'China fintech payment regulation free trade zone 2026',
  },
  {
    id: 'us1',
    category: 'us',
    label: 'OFAC & Sanctions',
    query: 'OFAC sanctions enforcement payment fintech cross-border',
  },
  {
    id: 'us2',
    category: 'us',
    label: 'FinCEN & AML',
    query: 'FinCEN AML enforcement money services payment',
  },
  {
    id: 'us3',
    category: 'us',
    label: 'CFPB & Remittance',
    query: 'CFPB enforcement cross-border remittance payment',
  },
  {
    id: 'global1',
    category: 'global',
    label: 'G20 Roadmap',
    query: 'G20 cross-border payments roadmap BIS FSB',
  },
  {
    id: 'global2',
    category: 'global',
    label: 'SWIFT & ISO 20022',
    query: 'SWIFT ISO 20022 cross-border payment migration',
  },
  {
    id: 'global3',
    category: 'global',
    label: 'CBDC & mBridge',
    query: 'mBridge CBDC cross-border payment digital currency',
  },
  {
    id: 'legal1',
    category: 'legal',
    label: 'Legal & Compliance',
    query: 'cross-border payment legal compliance enforcement lawsuit',
  },
];

const API_KEY = 'mdkp5xhnyjlycpjuqbgfwdwm7jghwjipqr9ovhlf'; // rss2json free key
const MAX_ITEMS = 4;

function googleNewsUrl(query) {
  return `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=en-US&gl=US&ceid=US:en`;
}

function rss2jsonUrl(rssUrl) {
  return `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&api_key=${API_KEY}&count=${MAX_ITEMS}`;
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return '';
  const diff = Math.floor((Date.now() - d) / 60000);
  if (diff < 60) return `${diff}m ago`;
  if (diff < 1440) return `${Math.floor(diff/60)}h ago`;
  return `${Math.floor(diff/1440)}d ago`;
}

function getSource(item) {
  // Google News RSS includes source in title as " - Source"
  const title = item.title || '';
  const parts = title.split(' - ');
  if (parts.length > 1) return parts[parts.length - 1];
  return item.author || '';
}

function cleanTitle(title) {
  const parts = title.split(' - ');
  if (parts.length > 1) parts.pop();
  return parts.join(' - ');
}

function buildSection(topic) {
  const el = document.createElement('div');
  el.className = `section visible`;
  el.dataset.category = topic.category;
  el.innerHTML = `
    <div class="section-head">
      <span class="section-label ${topic.category}">${topic.label}</span>
      <span class="section-dot ${topic.category}"></span>
    </div>
    <div class="articles" id="articles-${topic.id}">
      <div class="loading">Fetching headlines</div>
    </div>
  `;
  return el;
}

function renderArticles(topicId, items) {
  const container = document.getElementById(`articles-${topicId}`);
  if (!items || items.length === 0) {
    container.innerHTML = '<div class="empty">No recent articles found</div>';
    return;
  }
  container.innerHTML = items.slice(0, MAX_ITEMS).map(item => {
    const source = getSource(item);
    const title = cleanTitle(item.title || 'Untitled');
    const time = timeAgo(item.pubDate);
    return `
      <a class="article" href="${item.link}" target="_blank" rel="noopener">
        <div class="article-title">${title}</div>
        <div class="article-meta">
          <span class="article-source">${source}</span>
          <span class="article-time">${time}</span>
        </div>
      </a>
    `;
  }).join('');
}

async function fetchTopic(topic) {
  try {
    // Direct RSS feed (publications) or Google News search
    const rssUrl = topic.rss
      ? topic.rss
      : googleNewsUrl(topic.query);
    const apiUrl = rss2jsonUrl(rssUrl);
    const res = await fetch(apiUrl);
    const data = await res.json();
    if (data.status === 'ok' && data.items && data.items.length > 0) {
      renderArticles(topic.id, data.items);
      return data.items.length;
    }
    // Fallback: if direct RSS failed and there's a fallback query, try Google News
    if (topic.fallbackQuery) {
      const fallbackUrl = rss2jsonUrl(googleNewsUrl(topic.fallbackQuery));
      const res2 = await fetch(fallbackUrl);
      const data2 = await res2.json();
      if (data2.status === 'ok' && data2.items) {
        renderArticles(topic.id, data2.items);
        return data2.items.length;
      }
    }
    renderArticles(topic.id, []);
    return 0;
  } catch (e) {
    const container = document.getElementById(`articles-${topic.id}`);
    if (container) container.innerHTML = '<div class="empty">Could not load — check connection</div>';
    return 0;
  }
}

// ─── FILTER TABS ───────────────────────────────────────────────────────────────
document.querySelectorAll('.edition-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.edition-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const filter = tab.dataset.filter;
    document.querySelectorAll('.section').forEach(s => {
      if (filter === 'all' || s.dataset.category === filter) {
        s.classList.add('visible');
      } else {
        s.classList.remove('visible');
      }
    });
  });
});

// ─── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  // Date
  const now = new Date();
  document.getElementById('today-date').textContent = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('today-day').textContent = now.toLocaleDateString('en-US', { weekday: 'long' });

  // Build grid
  const grid = document.getElementById('grid');
  TOPICS.forEach(topic => grid.appendChild(buildSection(topic)));

  // Fetch all
  const counts = await Promise.all(TOPICS.map(fetchTopic));
  const total = counts.reduce((a, b) => a + b, 0);
  document.getElementById('article-count').textContent = `${total} articles loaded`;
  document.getElementById('last-updated').textContent = `Updated ${now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}`;
}

init();
</script>
</body>
</html>
